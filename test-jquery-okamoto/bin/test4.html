<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
    <button id="btn">ダブルクリックできないボタン</button>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $("#btn").click(function(){
            $(this).prop("disabled",true);
        })
    </script>
</body>
</html>
