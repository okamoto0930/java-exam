<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>

    年齢：<input type="number" name="age" id="age">
    <button id="btn">入力された年齢をアラート表示する</button>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
    $("#btn").click(function(){
        let age =$("#age").val();
        alert(age);
    })
    </script>

</body>
</html>
